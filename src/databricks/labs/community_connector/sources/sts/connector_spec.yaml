# sts Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
display_name: STS
connection:
  parameters:
    - name: client_id
      type: string
      required: true
      description: >
        OAuth client ID for the STS client-credentials application.

    - name: client_secret
      type: string
      required: true
      secret: true
      description: >
        OAuth client secret for the STS client-credentials application.

    - name: token_url
      type: string
      required: true
      description: >
        OAuth token endpoint used to exchange the client credentials for a bearer token.
        For the current MLS Data Hub tenant, this is typically
        `https://datahub-mls-customer.eu.auth0.com/oauth/token`.

    - name: audience
      type: string
      required: true
      description: >
        OAuth audience to request when obtaining the bearer token for STS APIs.
        For the current MLS Data Hub tenant, this is typically
        `https://distribution.mls-datahub.com`.

    - name: base_url
      type: string
      required: true
      description: >
        Base URL for the STS MLS Data Hub distribution API endpoints that the connector reads from.
        For the current MLS Data Hub tenant, this is typically
        `https://httpget.distribution.production.mls-datahub.com/DeliveryPlatform/REST/`.

# ============================================================================
# External Options Allowlist
# These table-specific options must be included in the externalOptionsAllowList
# parameter of the UC connection to allow them to be passed through.
# Use a comma-separated string of option names.
# If no table-specific options are needed, set to empty string or omit.
# ============================================================================
external_options_allowlist: "competition_id,season_id,club_id,matchday_id,match_id,team_id,max_records_per_batch"
